services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    user: "0:0"
    networks:
      - openclaw-net
    environment:
      HOME: /home/node
      OPENCLAW_INSTALL_WEIXIN_PLUGIN: "1"
      OPENCLAW_WEIXIN_PLUGIN_SPEC: "@tencent-weixin/openclaw-weixin@latest"
      TERM: xterm-256color
      TZ: UTC
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18789:18789"
    volumes:
      - ./openclaw-data:/home/node/.openclaw
      - ./openclaw-workspace:/home/node/.openclaw/workspace
    init: true
    restart: unless-stopped
    command:
      [
        "sh",
        "-lc",
        "set -e; EXT_DIR=/home/node/.openclaw/extensions; WEIXIN_DIR=\"$$EXT_DIR/openclaw-weixin\"; mkdir -p /home/node/.openclaw /home/node/.openclaw/workspace \"$$EXT_DIR\"; find \"$$EXT_DIR\" -maxdepth 1 -mindepth 1 -type d -name '.openclaw-install-stage-*' -exec rm -rf {} + || true; if [ ! -f /home/node/.openclaw/openclaw.json ]; then node dist/index.js config set gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback true --strict-json; fi; if [ \"${OPENCLAW_INSTALL_WEIXIN_PLUGIN:-1}\" = \"1\" ]; then if [ ! -f \"$$WEIXIN_DIR/package.json\" ]; then TMP_HOME=$$(mktemp -d); if HOME=\"$$TMP_HOME\" node dist/index.js plugins install \"${OPENCLAW_WEIXIN_PLUGIN_SPEC:-@tencent-weixin/openclaw-weixin@latest}\"; then rm -rf \"$$WEIXIN_DIR\"; cp -a \"$$TMP_HOME/.openclaw/extensions/openclaw-weixin\" \"$$WEIXIN_DIR\"; else echo '[startup] weixin plugin install failed, continue boot'; fi; rm -rf \"$$TMP_HOME\"; elif [ ! -f \"$$WEIXIN_DIR/node_modules/zod/package.json\" ]; then HOME=/home/node node dist/index.js plugins update openclaw-weixin || echo '[startup] weixin plugin repair failed, continue boot'; fi; fi; exec node dist/index.js gateway --bind lan --port 18789 --allow-unconfigured",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 30
      start_period: 360s

  clawpanel:
    build:
      context: .
      dockerfile: Dockerfile.clawpanel
    container_name: clawpanel
    depends_on:
      openclaw-gateway:
        condition: service_started
    networks:
      - openclaw-net
    environment:
      HOME: /root
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1420
      OPENCLAW_GATEWAY_HOST: openclaw-gateway
      TZ: UTC
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "1420:1420"
    volumes:
      - ./openclaw-data:/root/.openclaw
      - ./openclaw-workspace:/root/.openclaw/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    init: true

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    user: "0:0"
    depends_on:
      openclaw-gateway:
        condition: service_started
    networks:
      - openclaw-net
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: UTC
      BROWSER: echo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./openclaw-data:/home/node/.openclaw
      - ./openclaw-workspace:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    profiles: ["cli"]

networks:
  openclaw-net:
    driver: bridge
